<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>你是哪種工作風格？</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <style>
/* ────────────────────────────────
   工作風格測驗 · 共用
──────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  font-family: 'DM Mono', ui-monospace, monospace;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
kbd {
  display: inline-block; padding: 2px 6px; border: 1px solid currentColor;
  border-radius: 3px; font-size: 0.68rem; font-family: inherit; line-height: 1;
  margin: 0 2px; opacity: 0.75;
}

/* ================================
   方案 A · 編輯雜誌風
================================ */
.ed-wrap {
  --cream: #FAF7F2;
  --ink: #111;
  --accent: #D4521A;
  --muted: #8A8480;
  --border: #E6E1D9;
  --card: #FFFFFF;
  background: var(--cream); color: var(--ink);
  min-height: 100vh;
}

/* HERO */
.ed-hero {
  min-height: 100vh;
  padding: 2rem clamp(1.25rem, 4vw, 3rem);
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}
.ed-hero-grid {
  width: 100%; max-width: 1200px; margin: 0 auto;
  flex: 1; display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 2rem;
}
.ed-mast, .ed-hero-label, .ed-quiz-head, .ed-result-mast {
  font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
}
.ed-mast { display: flex; gap: 0.6rem; align-items: center; color: var(--muted); }
.ed-mast-num { color: var(--accent); font-weight: 600; }
.ed-mast-dot { opacity: 0.5; }
.ed-hero-top {
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border); padding-bottom: 1rem;
}
.ed-hero-label {
  color: var(--accent); border: 1px solid var(--accent);
  padding: 0.3rem 0.7rem;
}
.ed-hero-center {
  align-self: center;
  max-width: 760px;
}
.ed-hero-kicker {
  font-size: 0.72rem; letter-spacing: 0.3em; color: var(--accent);
  margin-bottom: 1.5rem; font-weight: 600;
}
.ed-hero-title {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(3rem, 10vw, 7.5rem);
  font-weight: 900; line-height: 0.92;
  letter-spacing: -0.04em; margin-bottom: 0.5rem;
}
.ed-accent { color: var(--accent); font-style: italic; }
.ed-hero-en {
  font-family: 'Fraunces', 'Noto Serif TC', serif;
  font-size: clamp(1.1rem, 2.5vw, 1.6rem);
  color: var(--muted); margin-bottom: 2rem;
  font-style: italic; letter-spacing: -0.01em;
}
.ed-hero-en em { font-style: normal; color: var(--accent); }
.ed-hero-sub {
  font-size: 0.88rem; line-height: 1.9; color: #3a3a3a;
  max-width: 440px; margin-bottom: 2.5rem;
}
.ed-hero-cta { display: flex; flex-wrap: wrap; align-items: center; gap: 2rem; }
.ed-btn-primary {
  background: var(--ink); color: var(--cream);
  padding: 1rem 2rem; font-size: 0.78rem;
  letter-spacing: 0.2em; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 0.6rem;
  transition: all 0.2s ease;
}
.ed-btn-primary:hover { background: var(--accent); transform: translateY(-2px); }
.ed-arr { transition: transform 0.2s ease; }
.ed-btn-primary:hover .ed-arr { transform: translateX(4px); }
.ed-hero-meta {
  font-size: 0.72rem; letter-spacing: 0.15em;
  color: var(--muted); text-transform: uppercase;
  display: flex; gap: 1rem; align-items: center;
}
.ed-hero-bar { width: 1px; height: 12px; background: var(--border); }
.ed-hero-foot {
  border-top: 1px solid var(--border); padding-top: 1.25rem;
}
.ed-hero-types {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
}
.ed-hero-type {
  font-size: 0.72rem; letter-spacing: 0.1em;
  display: flex; gap: 0.6rem; align-items: baseline;
  color: var(--ink);
}
.ed-idx { color: var(--accent); font-weight: 600; }

/* QUIZ */
.ed-quiz {
  max-width: 780px; margin: 0 auto;
  padding: 2.5rem clamp(1.25rem, 4vw, 2.5rem) 4rem;
  min-height: 100vh; display: flex; flex-direction: column;
}
.ed-quiz-head {
  display: flex; justify-content: space-between; align-items: baseline;
  border-top: 1px solid var(--ink); padding-top: 1rem;
}
.ed-quiz-head-l { display: flex; align-items: baseline; gap: 0.75rem; }
.ed-sm { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.ed-bignum {
  font-family: 'Noto Serif TC', serif;
  font-size: 2.5rem; font-weight: 900; color: var(--accent);
  line-height: 1; letter-spacing: -0.03em;
}
.ed-muted { color: var(--muted); }
.ed-progress {
  height: 2px; background: var(--border); margin: 0.8rem 0 2.5rem;
}
.ed-progress > div {
  height: 100%; background: var(--accent);
  transition: width 0.5s cubic-bezier(.2,.8,.2,1);
}

.ed-q { flex: 1; }
.ed-in-r { animation: edInR 0.4s cubic-bezier(.2,.8,.2,1) both; }
.ed-in-l { animation: edInL 0.4s cubic-bezier(.2,.8,.2,1) both; }
@keyframes edInR {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes edInL {
  from { opacity: 0; transform: translateX(-20px); }
  to   { opacity: 1; transform: translateX(0); }
}

.ed-q-zh {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(1.4rem, 3.5vw, 1.9rem);
  font-weight: 700; line-height: 1.45;
  letter-spacing: -0.01em; margin-bottom: 0.4rem;
}
.ed-q-en {
  font-family: 'Fraunces', serif; font-style: italic;
  color: var(--muted); font-size: 0.95rem;
  margin-bottom: 2rem; line-height: 1.5;
}
.ed-opts { display: flex; flex-direction: column; gap: 0.6rem; }
.ed-opt {
  background: var(--card); border: 1.5px solid var(--border);
  padding: 1rem 1.1rem; text-align: left;
  display: flex; align-items: flex-start; gap: 1rem;
  font-size: 0.85rem; line-height: 1.6;
  transition: all 0.15s ease; position: relative;
}
.ed-opt:hover {
  border-color: var(--accent); background: #FFF8F3;
  transform: translateX(6px);
}
.ed-opt.is-picked {
  border-color: var(--accent); background: #FFEFE5;
  transform: translateX(6px);
}
.ed-opt-k {
  font-size: 0.7rem; letter-spacing: 0.1em; color: var(--accent);
  font-weight: 600; min-width: 1.2rem; padding-top: 2px;
}
.ed-opt-body { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.ed-opt-zh { color: var(--ink); }
.ed-opt-en {
  font-family: 'Fraunces', serif; font-style: italic;
  color: var(--muted); font-size: 0.78rem;
}
.ed-opt-key {
  font-size: 0.65rem; color: var(--muted);
  border: 1px solid var(--border); border-radius: 3px;
  padding: 2px 5px; align-self: center;
}
.ed-opt.is-picked .ed-opt-key,
.ed-opt:hover .ed-opt-key { color: var(--accent); border-color: var(--accent); }

.ed-quiz-foot {
  margin-top: 2.5rem; display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid var(--border); padding-top: 1.25rem;
  font-size: 0.75rem;
}
.ed-btn-ghost {
  font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); transition: color 0.15s;
}
.ed-btn-ghost:hover:not(:disabled) { color: var(--accent); }
.ed-btn-ghost:disabled { opacity: 0.3; cursor: not-allowed; }
.ed-hint { color: var(--muted); font-size: 0.7rem; }

/* RESULT */
.ed-result {
  max-width: 980px; margin: 0 auto;
  padding: 2.5rem clamp(1.25rem, 4vw, 2.5rem) 4rem;
  animation: edInR 0.5s cubic-bezier(.2,.8,.2,1) both;
}
.ed-result-mast {
  display: flex; gap: 0.6rem; align-items: center; color: var(--muted);
  border-top: 1px solid var(--ink); padding-top: 1rem;
  margin-bottom: 3rem;
}
.ed-result-head { text-align: center; margin-bottom: 3.5rem; }
.ed-result-kicker {
  font-size: 0.72rem; letter-spacing: 0.3em; color: var(--accent);
  text-transform: uppercase; margin-bottom: 1rem;
}
.ed-result-title {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(4rem, 14vw, 9rem);
  font-weight: 900; line-height: 0.95;
  letter-spacing: -0.04em;
}
.ed-result-en {
  font-family: 'Fraunces', serif; font-style: italic;
  font-size: clamp(1.2rem, 3vw, 1.8rem); color: var(--muted);
  margin-top: 0.5rem;
}
.ed-result-tagline {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.1rem; color: var(--ink); margin-top: 1.5rem;
}

.ed-result-body {
  display: grid; grid-template-columns: 1fr 280px;
  gap: 3rem; margin-bottom: 3.5rem;
  border-top: 1px solid var(--border); padding-top: 2.5rem;
}
.ed-col-label {
  font-size: 0.7rem; letter-spacing: 0.2em;
  color: var(--accent); text-transform: uppercase;
  margin-bottom: 0.9rem; font-weight: 600;
}
.ed-result-desc {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.05rem; line-height: 1.85;
  margin-bottom: 0.8rem;
}
.ed-result-desc-en {
  font-family: 'Fraunces', serif; font-style: italic;
  color: var(--muted); line-height: 1.6; margin-bottom: 1.5rem;
}
.ed-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.ed-tag {
  border: 1px solid var(--border); background: #F0EDE8;
  padding: 0.3rem 0.7rem; font-size: 0.72rem;
  letter-spacing: 0.08em; color: #555;
}

.ed-radar {
  display: flex; justify-content: center; align-items: flex-start;
  border: 1px solid var(--border); background: #FCFAF6;
  padding: 1rem;
}

.ed-result-rows {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem 3rem;
  border-top: 1px solid var(--border); padding-top: 2.5rem; margin-bottom: 3.5rem;
}
.ed-ul { list-style: none; }
.ed-ul li {
  font-family: 'Noto Serif TC', serif;
  padding: 0.6rem 0; border-bottom: 1px dashed var(--border);
  font-size: 0.95rem; line-height: 1.6;
  position: relative; padding-left: 1.2rem;
}
.ed-ul li::before {
  content: '→'; position: absolute; left: 0; color: var(--accent);
  font-family: 'DM Mono', monospace;
}

.ed-scores { border-top: 1px solid var(--border); padding-top: 2.5rem; margin-bottom: 3rem; }
.ed-score-list { display: flex; flex-direction: column; gap: 1rem; }
.ed-score {}
.ed-score.is-top .ed-score-name { color: var(--accent); font-weight: 700; }
.ed-score-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 0.5rem; font-size: 0.78rem;
}
.ed-score-name { letter-spacing: 0.05em; }
.ed-score-v { color: var(--muted); letter-spacing: 0.05em; }
.ed-score-bar { height: 3px; background: var(--border); }
.ed-score-bar > div {
  height: 100%; background: var(--accent);
  transition: width 1.2s cubic-bezier(.2,.8,.2,1);
}
.ed-result-cta { text-align: center; margin-top: 1rem; }

@media (max-width: 720px) {
  .ed-result-body { grid-template-columns: 1fr; }
  .ed-result-rows { grid-template-columns: 1fr; }
  .ed-radar { margin-top: 1rem; }
  .ed-hero-cta { flex-direction: column; align-items: flex-start; gap: 1.25rem; }
  .ed-quiz-foot { flex-wrap: wrap; gap: 0.75rem; }
  .ed-hint { order: 3; width: 100%; text-align: center; }
}

/* ================================
   方案 B · Console / SaaS 風
================================ */
.cs-wrap {
  --cs-bg: #F7F7F5;
  --cs-panel: #FFFFFF;
  --cs-ink: #101014;
  --cs-dim: #8A8A92;
  --cs-border: #E4E4E0;
  --cs-border-strong: #CFCFC8;
  --cs-muted: #F0F0EC;
  --cs-grid: rgba(0,0,0,0.04);
  background: var(--cs-bg); color: var(--cs-ink);
  min-height: 100vh;
  font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif;
  background-image:
    linear-gradient(var(--cs-grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--cs-grid) 1px, transparent 1px);
  background-size: 48px 48px;
}
.cs-dark {
  --cs-bg: #0B0C10;
  --cs-panel: #141519;
  --cs-ink: #EDEDE8;
  --cs-dim: #7A7B82;
  --cs-border: #25262C;
  --cs-border-strong: #33343B;
  --cs-muted: #1B1C22;
  --cs-grid: rgba(255,255,255,0.03);
  color-scheme: dark;
}
.cs-mono { font-family: 'JetBrains Mono', 'DM Mono', ui-monospace, monospace; font-feature-settings: 'tnum'; }
.cs-dim { color: var(--cs-dim); }
.cs-hl { color: var(--accent); }

/* Topbar */
.cs-topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.9rem 1.5rem; border-bottom: 1px solid var(--cs-border);
  background: var(--cs-panel);
  font-size: 0.78rem;
  font-family: 'JetBrains Mono', monospace;
  position: sticky; top: 0; z-index: 5;
}
.cs-topbar-l, .cs-topbar-r { display: flex; align-items: center; gap: 0.6rem; }
.cs-logo { color: var(--accent); font-size: 1rem; }
.cs-logo-t { font-weight: 600; letter-spacing: 0.02em; }
.cs-chip {
  font-size: 0.65rem; padding: 2px 6px; border-radius: 3px;
  background: var(--cs-muted); color: var(--cs-dim);
  border: 1px solid var(--cs-border);
}

/* HERO B */
.cs-hero { min-height: 100vh; }
.cs-hero-body {
  max-width: 1280px; margin: 0 auto;
  padding: clamp(2.5rem, 6vw, 5rem) clamp(1.25rem, 4vw, 2.5rem);
  display: grid; grid-template-columns: 1.1fr 1fr; gap: 3rem; align-items: center;
}
.cs-eyebrow {
  font-size: 0.72rem; font-family: 'JetBrains Mono', monospace;
  color: var(--cs-dim); letter-spacing: 0.05em;
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.4rem 0.8rem; border: 1px solid var(--cs-border);
  border-radius: 99px; background: var(--cs-panel);
  margin-bottom: 1.5rem;
}
.cs-dot-live {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 0 3px rgba(91,91,214,0.18);
  animation: csPulse 2s ease-in-out infinite;
}
@keyframes csPulse { 50% { opacity: 0.4; } }

.cs-hero-title {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(3rem, 8vw, 5.5rem);
  font-weight: 900; line-height: 1.02;
  letter-spacing: -0.03em; margin-bottom: 0.5rem;
}
.cs-hero-en {
  font-family: 'Fraunces', serif; font-style: italic;
  font-size: 1.3rem; color: var(--cs-dim); margin-bottom: 1.75rem;
}
.cs-hero-en em { color: var(--accent); font-style: italic; }
.cs-hero-sub {
  font-size: 0.95rem; line-height: 1.8;
  max-width: 480px; margin-bottom: 2rem;
  color: var(--cs-ink);
}

.cs-btn {
  background: var(--cs-ink); color: var(--cs-bg);
  padding: 0.9rem 1.6rem; font-size: 0.85rem;
  font-weight: 600; letter-spacing: 0.02em;
  border-radius: 6px;
  display: inline-flex; align-items: center; gap: 0.6rem;
  transition: all 0.2s ease;
}
.cs-btn:hover { background: var(--accent); color: #fff; transform: translateY(-1px); }
.cs-btn span { opacity: 0.7; }

.cs-hero-meta {
  margin-top: 2.5rem;
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem;
  border-top: 1px solid var(--cs-border); padding-top: 1.5rem;
  max-width: 520px;
}
.cs-hero-meta > div { display: flex; flex-direction: column; gap: 3px; font-size: 0.85rem; }
.cs-hero-meta .cs-dim { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; }
.cs-hero-meta b { font-family: 'JetBrains Mono', monospace; font-weight: 600; }

/* panels */
.cs-panel {
  background: var(--cs-panel);
  border: 1px solid var(--cs-border);
  border-radius: 8px;
  overflow: hidden;
}
.cs-panel-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.7rem 1rem;
  border-bottom: 1px solid var(--cs-border);
  background: var(--cs-muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
}
.cs-panel-body { padding: 0.5rem; }

.cs-type-row {
  display: grid; grid-template-columns: auto auto 1fr auto;
  align-items: center; gap: 0.9rem;
  padding: 0.75rem 0.6rem;
  border-bottom: 1px dashed var(--cs-border);
  font-size: 0.85rem;
}
.cs-type-row:last-child { border-bottom: none; }
.cs-type-code { font-family: 'JetBrains Mono', monospace; color: var(--cs-dim); font-size: 0.75rem; }
.cs-type-sym {
  width: 28px; height: 28px; border-radius: 4px;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 0.78rem;
  color: #fff;
}
.cs-type-sym.sm { width: 22px; height: 22px; font-size: 0.68rem; }
.cs-type-sym[data-c="S"] { background: #5B5BD6; }
.cs-type-sym[data-c="E"] { background: #E5484D; }
.cs-type-sym[data-c="C"] { background: #30A46C; }
.cs-type-sym[data-c="R"] { background: #F76B15; }
.cs-type-sym[data-c="A"] { background: #0091FF; }
.cs-type-name { display: flex; flex-direction: column; gap: 2px; }
.cs-type-name b { font-weight: 600; font-size: 0.9rem; }
.cs-type-name span { font-size: 0.72rem; font-family: 'JetBrains Mono', monospace; }
.cs-type-tag {
  font-size: 0.75rem; color: var(--cs-dim);
  font-family: 'Noto Serif TC', serif; font-style: italic;
}

/* QUIZ B */
.cs-quiz { min-height: 100vh; }
.cs-quiz-grid {
  max-width: 1280px; margin: 0 auto;
  padding: 2rem clamp(1.25rem, 4vw, 2.5rem);
  display: grid; grid-template-columns: 1fr 340px;
  gap: 2rem; align-items: start;
}
.cs-q-main { min-width: 0; }
.cs-q-prog {
  background: var(--cs-panel); border: 1px solid var(--cs-border);
  border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1.5rem;
  font-family: 'JetBrains Mono', monospace; font-size: 0.78rem;
}
.cs-q-prog-row { display: flex; justify-content: space-between; margin-bottom: 0.7rem; }
.cs-q-bar {
  display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px;
}
.cs-q-tick { height: 6px; background: var(--cs-border); border-radius: 2px; transition: all 0.3s ease; }
.cs-q-tick.on { background: var(--accent); }
.cs-q-tick.cur { background: var(--accent); box-shadow: 0 0 0 2px color-mix(in oklab, var(--accent) 25%, transparent); }

.cs-q-body {
  background: var(--cs-panel); border: 1px solid var(--cs-border);
  border-radius: 8px; padding: 2rem;
  animation: csFade 0.35s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes csFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.cs-q-zh {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(1.3rem, 2.5vw, 1.7rem);
  font-weight: 700; line-height: 1.45; margin-bottom: 0.3rem;
}
.cs-q-en {
  font-family: 'Fraunces', serif; font-style: italic;
  color: var(--cs-dim); font-size: 0.95rem; margin-bottom: 1.75rem;
}
.cs-opts { display: flex; flex-direction: column; gap: 0.55rem; }
.cs-opt {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 1rem;
  padding: 0.9rem 1rem;
  border: 1px solid var(--cs-border); border-radius: 6px;
  background: var(--cs-bg); text-align: left;

// 方案 A：編輯雜誌風升級版
const { useState, useEffect, useRef, useMemo } = React;

function EditorialQuiz({ accent = '#D4521A', showKeys = true }) {
  const { types, questions } = window.QUIZ_DATA;
  const [stage, setStage] = useState('hero'); // hero | quiz | result
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState(Array(questions.length).fill(null));
  const [dir, setDir] = useState(1); // 動畫方向

  // 分數計算
  const scores = useMemo(() => {
    const s = { S: 0, E: 0, C: 0, R: 0, A: 0 };
    answers.forEach((a) => { if (a) s[a]++; });
    return s;
  }, [answers]);

  const total = questions.length;
  const answered = answers.filter(Boolean).length;
  const topKey = useMemo(() => {
    return Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  }, [scores]);

  // 鍵盤
  useEffect(() => {
    const onKey = (e) => {
      if (stage !== 'quiz') return;
      const q = questions[idx];
      if (/^[1-5]$/.test(e.key)) {
        const n = parseInt(e.key, 10) - 1;
        if (n < q.opts.length) selectOpt(q.opts[n].type);
      } else if (e.key === 'ArrowLeft' && idx > 0) {
        setDir(-1); setIdx(idx - 1);
      } else if (e.key === 'ArrowRight' && answers[idx]) {
        setDir(1); next();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [stage, idx, answers]);

  function start() {
    setAnswers(Array(questions.length).fill(null));
    setIdx(0); setDir(1); setStage('quiz');
  }

  function selectOpt(type) {
    const nxt = [...answers]; nxt[idx] = type; setAnswers(nxt);
    setTimeout(() => {
      if (idx < total - 1) { setDir(1); setIdx(idx + 1); }
      else setStage('result');
    }, 320);
  }

  function next() {
    if (idx < total - 1) { setDir(1); setIdx(idx + 1); }
    else setStage('result');
  }
  function prev() { if (idx > 0) { setDir(-1); setIdx(idx - 1); } }
  function retry() {
    setAnswers(Array(questions.length).fill(null));
    setIdx(0); setStage('hero');
  }

  return (
    <div className="ed-wrap" style={{ '--accent': accent }}>
      {stage === 'hero' && <Hero onStart={start} />}
      {stage === 'quiz' && (
        <QuizView
          idx={idx} dir={dir} total={total}
          q={questions[idx]} picked={answers[idx]}
          onPick={selectOpt} onPrev={prev} onNext={next}
          showKeys={showKeys}
        />
      )}
      {stage === 'result' && (
        <Result
          topKey={topKey} scores={scores} types={types}
          total={total} onRetry={retry}
        />
      )}
    </div>
  );
}

/* 五軸雷達圖 */
function Radar({ scores, total, types, topKey }) {
  const keys = ['S', 'E', 'C', 'R', 'A'];
  const size = 240, cx = size / 2, cy = size / 2, r = 90;
  const pts = keys.map((k, i) => {
    const angle = (Math.PI * 2 * i) / keys.length - Math.PI / 2;
    const v = scores[k] / total; // 0..1
    return {
      x: cx + Math.cos(angle) * r * v,
      y: cy + Math.sin(angle) * r * v,
      lx: cx + Math.cos(angle) * (r + 22),
      ly: cy + Math.sin(angle) * (r + 22),
      label: types[k].zh, code: k,
    };
  });
  const path = pts.map((p, i) => (i ? 'L' : 'M') + p.x + ',' + p.y).join(' ') + ' Z';
  return (
    <div className="ed-radar">
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {[0.25, 0.5, 0.75, 1].map((f, i) => {
          const pp = keys.map((_, j) => {
            const a = (Math.PI * 2 * j) / keys.length - Math.PI / 2;
            return `${cx + Math.cos(a) * r * f},${cy + Math.sin(a) * r * f}`;
          }).join(' ');
          return <polygon key={i} points={pp} fill="none" stroke="#E0DBD4" strokeWidth="1" />;
        })}
        {keys.map((_, i) => {
          const a = (Math.PI * 2 * i) / keys.length - Math.PI / 2;
          return <line key={i} x1={cx} y1={cy} x2={cx + Math.cos(a) * r} y2={cy + Math.sin(a) * r} stroke="#E0DBD4" strokeWidth="1" />;
        })}
        <path d={path} fill="var(--accent)" fillOpacity="0.18" stroke="var(--accent)" strokeWidth="1.5" />
        {pts.map((p, i) => (
          <circle key={i} cx={p.x} cy={p.y} r={p.code === topKey ? 4 : 3}
            fill={p.code === topKey ? 'var(--accent)' : '#fff'} stroke="var(--accent)" strokeWidth="1.5" />
        ))}
        {pts.map((p, i) => (
          <text key={i} x={p.lx} y={p.ly} textAnchor="middle" dominantBaseline="middle"
            fontFamily="'Noto Serif TC', serif" fontSize="13" fontWeight="700"
            fill={p.code === topKey ? 'var(--accent)' : '#1A1A1A'}>
            {p.label}
          </text>
        ))}
      </svg>
    </div>
  );
}

              </div>
            )}
            <button className="cs-btn-ghost" onClick={onNext} disabled={!picked}>
              下一題 Next →
            </button>
          </div>
        </div>

        {/* 右：即時儀表板 */}
        <div className="cs-side">
          <div className="cs-panel">
            <div className="cs-panel-head">
              <span>live_scores.tsv</span>
              <span className="cs-dim">updates live</span>
            </div>
            <div className="cs-panel-body cs-live">
              {Object.entries(scores).sort((a, b) => b[1] - a[1]).map(([k, v]) => {
                const p = answered ? Math.round((v / answered) * 100) : 0;
                return (
                  <div key={k} className="cs-live-row">
                    <div className="cs-live-head">
                      <span className="cs-type-sym sm" data-c={k}>{k}</span>
                      <span className="cs-live-name">{types[k].zh}</span>
                      <span className="cs-mono">{v} · {p}%</span>
                    </div>
                    <div className="cs-live-bar"><div style={{ width: p + '%' }} /></div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="cs-panel">
            <div className="cs-panel-head"><span>history.log</span></div>
            <div className="cs-panel-body cs-log">
              {answers.map((a, i) => (
                <div key={i} className={`cs-log-row ${a ? 'done' : ''} ${i === idx ? 'cur' : ''}`}>
                  <span className="cs-mono">Q{String(i + 1).padStart(2, '0')}</span>
                  <span className="cs-dim">→</span>
                  <span>{a ? types[a].zh : '—'}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── RESULT ── */
function CSResult({ topKey, scores, types, total, onRetry }) {
  const t = types[topKey];
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const now = new Date();
  const stamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  return (
    <div className="cs-result">
      <div className="cs-topbar">
        <div className="cs-topbar-l">
          <span className="cs-logo">◆</span>
          <span className="cs-logo-t">workstyle.dx</span>
          <span className="cs-chip">REPORT</span>
        </div>
        <div className="cs-topbar-r">
          <span className="cs-dim">generated</span>
          <span className="cs-mono">{stamp}</span>
        </div>
      </div>

      <div className="cs-report">
        {/* 主卡 */}
        <div className="cs-report-hero">
          <div className="cs-report-hero-l">
            <div className="cs-dim cs-mono">result.primary_type</div>
            <div className="cs-report-badge">TYPE · {t.code}</div>
            <h1 className="cs-report-title">
              <span className="cs-hl">{t.zh}</span>
              <span className="cs-report-en">The {t.en}</span>
            </h1>
            <div className="cs-report-tagline">「{t.tagline_zh}」</div>
            <p className="cs-report-desc">{t.desc_zh}</p>
            <div className="cs-tags">
              {t.tags_zh.map((tag, i) => <span key={i} className="cs-tag">#{tag}</span>)}
            </div>
          </div>
          <div className="cs-report-hero-r">
            <CSBars scores={scores} types={types} total={total} topKey={topKey} />
          </div>
        </div>

        {/* 細節網格 */}
        <div className="cs-report-grid">
          <Card title="Strengths · 你的優勢" items={t.strengths_zh} />
          <Card title="Blindspots · 可能盲點" items={t.blindspots_zh} />
          <Card title="Pairs · 黃金搭檔" items={t.pairs_zh} />
          <Card title="Roles · 適合角色" items={t.roles_zh} />
        </div>

        {/* 分佈表 */}
        <div className="cs-panel">
          <div className="cs-panel-head">
            <span>distribution.table</span>
            <span className="cs-dim">all types · normalized</span>
          </div>
          <div className="cs-dist">
            <div className="cs-dist-row cs-dist-head">
              <span>#</span><span>TYPE</span><span>名稱</span>
              <span>SCORE</span><span>%</span><span>DISTRIBUTION</span>
            </div>
            {sorted.map(([k, v], i) => {
              const p = Math.round((v / total) * 100);
              return (
                <div key={k} className={`cs-dist-row ${k === topKey ? 'top' : ''}`}>
                  <span className="cs-mono">{String(i + 1).padStart(2, '0')}</span>
                  <span className="cs-type-sym sm" data-c={k}>{k}</span>
                  <span>{types[k].zh} · <span className="cs-dim">{types[k].en}</span></span>
                  <span className="cs-mono">{v}/{total}</span>
                  <span className="cs-mono">{p}%</span>
                  <span className="cs-dist-bar"><div style={{ width: p + '%' }} /></span>
                </div>
              );
            })}
          </div>
        </div>

        <div className="cs-result-cta">
          <button className="cs-btn" onClick={onRetry}>重新測驗 Retry ↻</button>
          <button className="cs-btn-ghost" onClick={() => window.print()}>匯出 Export ↓</button>
        </div>
      </div>
    </div>
  );
}

function Card({ title, items }) {
  return (
    <div className="cs-panel cs-card">
      <div className="cs-panel-head"><span>{title}</span></div>
      <div className="cs-panel-body">
        <ul className="cs-ul">{items.map((s, i) => <li key={i}>{s}</li>)}</ul>
      </div>
    </div>
  );
}

function CSBars({ scores, types, total, topKey }) {
  return (
    <div className="cs-bars">
      {Object.entries(scores).sort((a, b) => b[1] - a[1]).map(([k, v]) => {
        const p = Math.round((v / total) * 100);
        return (
          <div key={k} className={`cs-bar-row ${k === topKey ? 'top' : ''}`}>
            <div className="cs-bar-label">
              <span className="cs-type-sym sm" data-c={k}>{k}</span>
              <span>{types[k].zh}</span>
            </div>
            <div className="cs-bar-track">
              <div className="cs-bar-fill" style={{ width: p + '%' }} />
              <span className="cs-bar-v cs-mono">{p}%</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

window.ConsoleQuiz = ConsoleQuiz;

    const TWEAK_DEFAULTS = {
      "variant": "editorial",
      "accent": "#8B1E3F",
      "dark": false,
      "showKeys": true
    };

    const ACCENTS = {
      editorial: ['#D4521A', '#1B4332', '#2D3A87', '#8B1E3F'],
      console:   ['#5B5BD6', '#0091FF', '#30A46C', '#F76B15', '#E5484D']
    };

    function App() {
      const [variant, setVariant] = React.useState(TWEAK_DEFAULTS.variant);
      const [accent, setAccent] = React.useState(TWEAK_DEFAULTS.accent);
      const [dark, setDark] = React.useState(TWEAK_DEFAULTS.dark);
      const [showKeys, setShowKeys] = React.useState(TWEAK_DEFAULTS.showKeys);

      React.useEffect(() => {
        const palette = ACCENTS[variant];
        if (!palette.includes(accent)) setAccent(palette[0]);
      }, [variant]);

      React.useEffect(() => {
        window.__tw = window.__tw || {};
        window.__tw.sync = () => {
          document.querySelectorAll('#tw-variant button').forEach(b => {
            b.classList.toggle('on', b.dataset.v === variant);
          });
          const holder = document.getElementById('tw-accent');
          holder.innerHTML = ACCENTS[variant].map(c =>
            `<button class="tw-swatch ${c===accent?'on':''}" style="background:${c}" data-c="${c}"></button>`
          ).join('');
          holder.querySelectorAll('.tw-swatch').forEach(b => {
            b.onclick = () => setAccent(b.dataset.c);
          });
          document.getElementById('tw-dark').checked = dark;
          document.getElementById('tw-dark-row').style.display = variant === 'console' ? 'flex' : 'none';
          document.getElementById('tw-keys').checked = showKeys;
        };
        document.querySelectorAll('#tw-variant button').forEach(b => {
          b.onclick = () => setVariant(b.dataset.v);
        });
        document.getElementById('tw-dark').onchange = (e) => setDark(e.target.checked);
        document.getElementById('tw-keys').onchange = (e) => setShowKeys(e.target.checked);
        window.__tw.sync();
      }, [variant, accent, dark, showKeys]);

      if (variant === 'editorial') {
        return <EditorialQuiz accent={accent} showKeys={showKeys} />;
      }
      return <ConsoleQuiz accent={accent} dark={dark} showKeys={showKeys} />;
    }

    window.__tw = {
      open: () => document.getElementById('tw-panel').classList.add('open'),
      close: () => document.getElementById('tw-panel').classList.remove('open')
    };

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
